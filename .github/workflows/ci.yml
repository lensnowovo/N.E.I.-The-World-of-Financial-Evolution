name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-safety:
    name: Release safety (no db push in build)
    runs-on: ubuntu-latest
    # Fast, dependency-free gate. Runs before/alongside the full validate job
    # so a regression that re-introduces `prisma db push` (or any DB-mutating
    # command) into the Vercel build lifecycle fails CI immediately.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check build lifecycle cannot mutate databases
        run: npm run check:release-safety

      - name: Run release-safety unit tests
        run: npm run test:release-safety

  validate:
    name: Lint, typecheck, and validate schema
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nei_ci
      SESSION_SECRET: ci-session-secret-change-in-production
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Show runtime versions
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Memory web schema migration safety
        run: npm run test:memory-schema

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      # `npm run build` is intentionally not required here yet because this
      # project uses PostgreSQL-backed server rendering and production-only
      # environment variables. Vercel Preview remains the deployment build gate.
      # Add a dedicated CI database before making build a required PR check.
